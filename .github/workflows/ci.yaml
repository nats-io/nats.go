name: ci
on: 
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

jobs:
    lint:
        runs-on: ubuntu-latest-8-cores
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
      
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: 'stable'

            - name: Install deps
              shell: bash --noprofile --norc -x -eo pipefail {0}
              run: |
                go get -t ./...
                go install honnef.co/go/tools/cmd/staticcheck@latest
                go install github.com/client9/misspell/cmd/misspell@latest
                go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest
            
            - name: Run linters
              shell: bash --noprofile --norc -x -eo pipefail {0}
              run: |
                $(exit $(go fmt -modfile=go_test.mod  ./... | wc -l))
                go vet -modfile=go_test.mod ./... 
                GOFLAGS="-mod=mod -modfile=go_test.mod" staticcheck ./...
                find . -type f -name "*.go" | xargs misspell -error -locale US
                golangci-lint run --timeout 5m0s ./jetstream/...

    test:
        runs-on: ubuntu-latest-8-cores

        strategy:
            matrix:
              go: [ "1.25", "1.26" ]
              include:
                - go: "1.26"
                  coverage: true
        steps:
            - name: Checkout code
              uses: actions/checkout@v6
      
            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: ${{ matrix.go }}

            - name: Install deps
              shell: bash --noprofile --norc -x -eo pipefail {0}
              run: |
                go install github.com/mattn/goveralls@latest
                go install github.com/wadey/gocovmerge@latest

            - name: Test and coverage
              shell: bash --noprofile --norc -x -eo pipefail {0}
              env:
                # ./test is testservice-only after Phase 4 and runs in the
                # test-tester job. The embedded job still covers the root
                # package and jetstream/test, micro/test (those packages
                # migrate later).
                EMBEDDED_PKGS: ". ./bench/... ./encoders/... ./internal/... ./jetstream/... ./micro/..."
              run: |
                go test -modfile=go_test.mod -v -run=TestNoRace -p=1 $EMBEDDED_PKGS --failfast -vet=off
                if [ "${{ matrix.coverage }}" = "true" ]; then
                  ./scripts/cov.sh CI
                else
                  go test -modfile=go_test.mod -race -v -p=1 $EMBEDDED_PKGS --failfast -vet=off -tags=internal_testing
                fi

            - name: Coveralls
              if: matrix.coverage
              uses: coverallsapp/github-action@v2
              with:
               file: acc.out

    test-tester:
        runs-on: ubuntu-latest
        # Run the Go test binary inside an alpine container so it lives on the
        # same docker network as the tester service and can dial the spawned
        # NATS servers directly by service name.
        container: golang:alpine
        services:
          nats:
            image: synadia/server-tester:2.14.0
            options: --name nats
            volumes:
              - ${{ github.workspace }}/test/configs:/test-configs:ro
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install build deps
              run: |
                apk add --no-cache gcc libc-dev git make

            - name: Run testservice tests
              env:
                TESTER_NATS_URL: nats://nats:4222
                CGO_ENABLED: "1"
              run: |
                go test -modfile=go_test.mod -tags=testservice -race -v -p=1 ./test/... ./jetstream/test/... ./micro/test/... --failfast
