name: ci
on:
  push:
    branches:
      - main
  pull_request:
  release:
    types: [published]

jobs:
    lint:
        runs-on: ubuntu-latest-8-cores
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Setup Go
              uses: actions/setup-go@v6
              with:
                go-version: 'stable'

            - name: Install deps
              shell: bash --noprofile --norc -x -eo pipefail {0}
              run: |
                go get -t ./...
                go install honnef.co/go/tools/cmd/staticcheck@latest
                go install github.com/client9/misspell/cmd/misspell@latest
                go install github.com/golangci/golangci-lint/cmd/golangci-lint@latest

            - name: Run linters
              shell: bash --noprofile --norc -x -eo pipefail {0}
              run: |
                $(exit $(go fmt -modfile=go_test.mod  ./... | wc -l))
                go vet -modfile=go_test.mod ./...
                GOFLAGS="-mod=mod -modfile=go_test.mod" staticcheck ./...
                find . -type f -name "*.go" | xargs misspell -error -locale US
                golangci-lint run --timeout 5m0s ./jetstream/...

    test:
        runs-on: ubuntu-latest-8-cores
        # Run inside an alpine container on the same docker network as the
        # tester service so the spawned NATS servers are reachable by service
        # name (no host port publishing needed).
        strategy:
            matrix:
              go: [ "1.25", "1.26" ]
              include:
                - go: "1.26"
                  coverage: true
        container: golang:${{ matrix.go }}-alpine
        services:
          nats:
            image: synadia/server-tester:2.14.0
            options: --name nats
        env:
          TESTER_NATS_URL: nats://nats:4222
          CGO_ENABLED: "1"
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install build deps
              run: |
                apk add --no-cache gcc libc-dev git make bash curl ca-certificates
                go install github.com/mattn/goveralls@latest
                go install github.com/wadey/gocovmerge@latest

            - name: NoRace tests
              shell: bash --noprofile --norc -x -eo pipefail {0}
              run: |
                go test -modfile=go_test.mod -v -run=TestNoRace -p=1 ./... --failfast -vet=off

            - name: Test and coverage
              shell: bash --noprofile --norc -x -eo pipefail {0}
              run: |
                if [ "${{ matrix.coverage }}" = "true" ]; then
                  ./scripts/cov.sh CI
                else
                  go test -modfile=go_test.mod -race -v -p=1 ./... --failfast -vet=off -tags=internal_testing
                fi

            - name: Coveralls
              if: matrix.coverage
              uses: coverallsapp/github-action@v2
              with:
               file: acc.out
