name: Test nats-server@main
on:
  schedule:
    - cron: "30 8 * * *"

jobs:
    test:
        runs-on: ubuntu-latest-8-cores
        # Run inside an alpine container on the same docker network as the
        # tester service, matching ci.yaml. The nightly-latest-nats-main image
        # is built daily by the upstream synadia/server-tester repo against the
        # current nats-server main branch.
        container: golang:1.26-alpine
        services:
          nats:
            image: synadia/server-tester:nightly-latest-nats-main
            options: --name nats
        env:
          TESTER_NATS_URL: nats://nats:4222
          CGO_ENABLED: "1"
        steps:
            - name: Checkout code
              uses: actions/checkout@v6

            - name: Install build deps
              run: |
                apk add --no-cache gcc libc-dev git make bash curl ca-certificates

            - name: NoRace tests
              shell: bash --noprofile --norc -x -eo pipefail {0}
              run: |
                go test -modfile=go_test.mod -v -run=TestNoRace -p=1 ./... --failfast -vet=off

            - name: Test
              shell: bash --noprofile --norc -x -eo pipefail {0}
              run: |
                go test -modfile=go_test.mod -race -v -p=1 ./... --failfast -vet=off -tags=internal_testing
